name: Deploy API (api.bestbond.in)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-reward-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check deploy secrets
        shell: bash
        run: |
          missing=()
          [[ -z "${{ secrets.VPS_HOST }}" ]] && missing+=(VPS_HOST)
          [[ -z "${{ secrets.VPS_SSH_KEY }}" ]] && missing+=(VPS_SSH_KEY)
          if ((${#missing[@]})); then
            echo "::error::Missing required repository secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy on VPS (deploy.sh)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.VPS_API_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/var/www/api.bestbond.in; fi
            cd "$APP_DIR"
            chmod +x deploy.sh deploy/restart.sh 2>/dev/null || true
            RUN_GIT_PULL=1 ./deploy.sh

name: Deploy API (api.bestbond.in)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-reward-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Pull, build, PM2 reload on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR="${{ vars.VPS_API_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR=/var/www/api.bestbond.in; fi
            cd "$APP_DIR"
            git remote -v
            git fetch origin main
            git reset --hard origin/main
            export NODE_ENV=production
            export PUPPETEER_SKIP_DOWNLOAD=1
            npm ci --omit=dev
            npm run build
            pm2 startOrReload ecosystem.config.cjs --only bestbond-reward-api --update-env
            pm2 save
